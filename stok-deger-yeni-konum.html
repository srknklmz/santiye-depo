<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stok Değeri — Yeni Konum Tasarımı</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; }

  /* ── Sayfa iskelet ── */
  .page { display: flex; height: 100vh; }
  .sidebar { width: 220px; background: #1e293b; flex-shrink: 0; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { height: 52px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; padding: 0 20px; font-weight: 700; color: #64748b; font-size: 13px; }

  /* ── İçerik alanı ── */
  .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; padding: 0; }

  /* ── Başlık + filtreler satırı (mevcut) ── */
  .header-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #e2e8f0; background: white; flex-shrink: 0; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 12px; color: #475569; cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .chip { padding: 4px 12px; border-radius: 20px; background: #f1f5f9; border: 1px solid #e2e8f0; font-size: 13px; font-weight: 800; color: #0f172a; display: flex; align-items: center; gap: 5px; }
  .chip span { font-size: 10px; font-weight: 600; color: #475569; text-transform: uppercase; }
  .title { font-size: 17px; font-weight: 800; color: #0f172a; margin-right: 4px; }
  .ml-auto { margin-left: auto; }
  .export-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid #e2e8f0; background: white; font-size: 11px; color: #475569; cursor: pointer; }

  /* ── STOK DEĞERİ BANDI (yeni konum — tablonun üstü) ── */
  .value-band { display: flex; align-items: stretch; gap: 0; background: white; border-bottom: 1px solid #e2e8f0; padding: 0; flex-shrink: 0; overflow: hidden; }

  .v-item { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 10px 20px; border-right: 1px solid #f1f5f9; flex: 1; min-width: 0; }
  .v-item:last-child { border-right: none; }
  .v-item .lbl { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; white-space: nowrap; }
  .v-item .val { font-size: 13px; font-weight: 600; white-space: nowrap; color: #0f172a; }

  .v-divider { width: 1px; background: #e2e8f0; flex-shrink: 0; align-self: stretch; margin: 8px 0; }

  /* ── Tablo alanı ── */
  .table-area { flex: 1; display: flex; gap: 14px; padding: 14px 16px; min-height: 0; overflow: hidden; }
  .list-panel { width: 280px; background: white; border: 1px solid #e2e8f0; border-radius: 10px; flex-shrink: 0; overflow: hidden; }
  .detail-panel { flex: 1; background: white; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
  .panel-inner { padding: 16px; }
  .placeholder { height: 100%; display: flex; align-items: center; justify-content: center; color: #cbd5e1; font-size: 13px; }
  .list-item { padding: 12px 14px; border-bottom: 1px solid #f8fafc; font-size: 13px; color: #374151; }
  .list-item:first-child { font-weight: 700; background: #f8fafc; }
</style>
</head>
<body>
<div class="page">
  <div class="sidebar"></div>
  <div class="main">
    <div class="topbar">Stok Özeti</div>
    <div class="content">

      <!-- TEK SATIR: filtreler (sol) + stok değerleri (sağ) + export -->
      <div class="value-band" style="padding: 0 16px; gap: 0; justify-content: flex-start;">

        <!-- Sol grup: başlık + filtreler + sayaç -->
        <div style="display:flex; align-items:center; gap:8px; padding: 8px 0; flex-shrink:0; margin-right:16px;">
          <div class="title" style="font-size:15px;">Stok Özeti</div>
          <div class="filter-btn">Malzeme ▾</div>
          <div class="filter-btn">Kategori ▾</div>
          <div class="chip">370 <span>Malzeme</span></div>
        </div>

        <div class="v-divider" style="margin: 6px 0;"></div>

        <!-- Stok değerleri -->
        <div class="v-item in" style="flex:0 0 auto; padding: 8px 16px;">
          <div class="lbl">Toplam Alınan</div>
          <div class="val">₺ 11.925.232</div>
        </div>
        <div class="v-divider" style="margin: 6px 0;"></div>
        <div class="v-item out" style="flex:0 0 auto; padding: 8px 16px;">
          <div class="lbl">Çıkış Yapılan</div>
          <div class="val">₺ 1.299.901</div>
        </div>
        <div class="v-divider" style="margin: 6px 0;"></div>
        <div class="v-item dep" style="flex:0 0 auto; padding: 8px 16px;">
          <div class="lbl">Kalan — Depo</div>
          <div class="val">₺ 10.325.831</div>
        </div>
        <div class="v-divider" style="margin: 6px 0;"></div>
        <div class="v-item zim" style="flex:0 0 auto; padding: 8px 16px;">
          <div class="lbl">Kalan — Zimmet</div>
          <div class="val">₺ 299.500</div>
        </div>
        <div class="v-divider" style="margin: 6px 0;"></div>
        <div class="v-item" style="flex:0 0 auto; padding: 8px 16px;">
          <div class="lbl">Stok Değeri</div>
          <div class="val" style="font-weight:700;">₺ 10.625.331</div>
        </div>

        <!-- Export sağa yaslanmış -->
        <div style="margin-left:auto; display:flex; align-items:center; gap:4px; flex-shrink:0;">
          <button class="export-btn">Excel</button>
          <button class="export-btn">PDF</button>
        </div>

      </div>

      <!-- Tablo panelleri -->
      <div class="table-area">
        <div class="list-panel">
          <div class="list-item">MEKANİK — 110 Kalde 32 Tapa</div>
          <div class="list-item">ELEKTRİK — Kablo 3x2.5mm</div>
          <div class="list-item">HIRDAVAT — Çivi 10cm</div>
          <div class="list-item">YAPI — Çimento 42.5R</div>
        </div>
        <div class="detail-panel">
          <div class="placeholder">Detay paneli</div>
        </div>
      </div>

    </div>
  </div>
</div>
</body>
</html>
