<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buton Sayaç Tasarım Önerileri</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f172a;
    padding: 32px 24px;
    color: #fff;
    min-height: 100vh;
  }
  h1 { font-size: 16px; font-weight: 700; color: #e2e8f0; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #64748b; margin-bottom: 36px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 24px;
    max-width: 1100px;
  }

  .option {
    background: #1e293b;
    border-radius: 14px;
    padding: 20px;
    border: 1px solid #334155;
  }
  .option-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #475569;
    margin-bottom: 14px;
  }
  .option-title {
    font-size: 13px;
    font-weight: 700;
    color: #cbd5e1;
    margin-bottom: 16px;
  }
  .btn-group { display: flex; flex-direction: column; gap: 8px; }

  /* ── ORTAK BUTON BASE ── */
  .btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 9px;
    font-size: 12.5px;
    font-weight: 600;
    color: #fff;
    border: none;
    width: 100%;
    cursor: pointer;
    text-align: left;
  }
  .btn svg { flex-shrink: 0; width: 15px; height: 15px; }
  .btn-label { flex: 1; }
  .btn-green  { background: linear-gradient(135deg, #34d399, #059669); }
  .btn-red    { background: linear-gradient(135deg, #f87171, #dc2626); }
  .btn-purple { background: linear-gradient(135deg, #a78bfa, #6d28d9); }

  /* ══ OPSİYON 1 — Frosted Pill ══ */
  .opt1 .badge {
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(4px);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
    min-width: 24px;
    text-align: center;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }

  /* ══ OPSİYON 2 — Divider + Number ══ */
  .opt2 .divider {
    width: 1px;
    height: 16px;
    background: rgba(255,255,255,0.30);
    flex-shrink: 0;
  }
  .opt2 .count {
    font-size: 13px;
    font-weight: 700;
    min-width: 18px;
    text-align: right;
    opacity: 0.92;
    flex-shrink: 0;
  }

  /* ══ OPSİYON 3 — Inset Block ══ */
  .opt3 .inset {
    background: rgba(0,0,0,0.20);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 700;
    min-width: 28px;
    text-align: center;
    flex-shrink: 0;
    line-height: 1.4;
  }
  .opt3 .inset-lbl {
    font-size: 8px;
    font-weight: 600;
    opacity: 0.7;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: block;
    line-height: 1;
  }
  .opt3 .inset-val {
    display: block;
    font-size: 13px;
    line-height: 1.2;
  }

  /* ══ OPSİYON 4 — Soft Right Section ══ */
  .opt4 .btn {
    padding: 0;
    overflow: hidden;
  }
  .opt4 .btn-main {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    flex: 1;
  }
  .opt4 .btn-count {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 13px;
    height: 100%;
    background: rgba(0,0,0,0.18);
    font-size: 14px;
    font-weight: 700;
    min-width: 38px;
    flex-shrink: 0;
    border-left: 1px solid rgba(255,255,255,0.15);
  }

  /* ══ OPSİYON 5 — Superscript Dot Badge ══ */
  .opt5 .btn {
    position: relative;
  }
  .opt5 .btn-inner {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .opt5 .dot-badge {
    background: rgba(255,255,255,0.95);
    color: #1e293b;
    border-radius: 99px;
    font-size: 10.5px;
    font-weight: 800;
    min-width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
    flex-shrink: 0;
    letter-spacing: -0.02em;
  }
  .opt5 .btn-green .dot-badge  { color: #059669; }
  .opt5 .btn-red .dot-badge    { color: #dc2626; }
  .opt5 .btn-purple .dot-badge { color: #6d28d9; }

  /* SVG icons inline */
  .icon { display:inline-flex; align-items:center; }
</style>
</head>
<body>

<h1>Buton Sayaç Tasarım Önerileri</h1>
<p class="subtitle">Giriş/Çıkış/Zimmet butonlarına bugünkü işlem sayısı entegrasyonu — 5 alternatif</p>

<div class="grid">

  <!-- OPSİYON 1 -->
  <div class="option opt1">
    <div class="option-label">Opsiyon 1</div>
    <div class="option-title">Frosted Pill Badge</div>
    <div class="btn-group">
      <button class="btn btn-green">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
        <span class="btn-label">Giriş Ekle</span>
        <span class="badge">5</span>
      </button>
      <button class="btn btn-red">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 7L7 17M7 17h10M7 17V7"/></svg>
        <span class="btn-label">Çıkış Ekle</span>
        <span class="badge">12</span>
      </button>
      <button class="btn btn-purple">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span class="btn-label">Zimmet Ekle</span>
        <span class="badge">3</span>
      </button>
    </div>
  </div>

  <!-- OPSİYON 2 -->
  <div class="option opt2">
    <div class="option-label">Opsiyon 2</div>
    <div class="option-title">Divider + Sayı</div>
    <div class="btn-group">
      <button class="btn btn-green">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
        <span class="btn-label">Giriş Ekle</span>
        <span class="divider"></span>
        <span class="count">5</span>
      </button>
      <button class="btn btn-red">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 7L7 17M7 17h10M7 17V7"/></svg>
        <span class="btn-label">Çıkış Ekle</span>
        <span class="divider"></span>
        <span class="count">12</span>
      </button>
      <button class="btn btn-purple">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span class="btn-label">Zimmet Ekle</span>
        <span class="divider"></span>
        <span class="count">3</span>
      </button>
    </div>
  </div>

  <!-- OPSİYON 3 -->
  <div class="option opt3">
    <div class="option-label">Opsiyon 3</div>
    <div class="option-title">İnset Blok (Etiket + Sayı)</div>
    <div class="btn-group">
      <button class="btn btn-green">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
        <span class="btn-label">Giriş Ekle</span>
        <span class="inset"><span class="inset-lbl">bugün</span><span class="inset-val">5</span></span>
      </button>
      <button class="btn btn-red">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 7L7 17M7 17h10M7 17V7"/></svg>
        <span class="btn-label">Çıkış Ekle</span>
        <span class="inset"><span class="inset-lbl">bugün</span><span class="inset-val">12</span></span>
      </button>
      <button class="btn btn-purple">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span class="btn-label">Zimmet Ekle</span>
        <span class="inset"><span class="inset-lbl">bugün</span><span class="inset-val">3</span></span>
      </button>
    </div>
  </div>

  <!-- OPSİYON 4 -->
  <div class="option opt4">
    <div class="option-label">Opsiyon 4</div>
    <div class="option-title">Bölünmüş Buton (Split Button)</div>
    <div class="btn-group">
      <button class="btn btn-green">
        <span class="btn-main">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px;flex-shrink:0"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
          Giriş Ekle
        </span>
        <span class="btn-count">5</span>
      </button>
      <button class="btn btn-red">
        <span class="btn-main">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px;flex-shrink:0"><path d="M17 7L7 17M7 17h10M7 17V7"/></svg>
          Çıkış Ekle
        </span>
        <span class="btn-count">12</span>
      </button>
      <button class="btn btn-purple">
        <span class="btn-main">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px;flex-shrink:0"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          Zimmet Ekle
        </span>
        <span class="btn-count">3</span>
      </button>
    </div>
  </div>

  <!-- OPSİYON 5 -->
  <div class="option opt5">
    <div class="option-label">Opsiyon 5</div>
    <div class="option-title">Beyaz Pill Badge (Renkli Yazı)</div>
    <div class="btn-group">
      <button class="btn btn-green">
        <span class="btn-inner">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px;flex-shrink:0"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
          <span style="flex:1">Giriş Ekle</span>
        </span>
        <span class="dot-badge">5</span>
      </button>
      <button class="btn btn-red">
        <span class="btn-inner">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px;flex-shrink:0"><path d="M17 7L7 17M7 17h10M7 17V7"/></svg>
          <span style="flex:1">Çıkış Ekle</span>
        </span>
        <span class="dot-badge">12</span>
      </button>
      <button class="btn btn-purple">
        <span class="btn-inner">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px;flex-shrink:0"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          <span style="flex:1">Zimmet Ekle</span>
        </span>
        <span class="dot-badge">3</span>
      </button>
    </div>
  </div>

</div>

</body>
</html>
